services:
  - type: web
    name: nexus-store
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: DEV_PASSWORD
        value: nexus2025
